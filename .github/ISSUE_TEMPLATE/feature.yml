name: Feature Request
description: Propose a new feature
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
    validations:
      required: false

  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - phase-1
        - phase-2
        - phase-3
        - phase-4
        - phase-5
    validations:
      required: true
